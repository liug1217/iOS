  <meta charset="UTF-8" />

  <title></title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #0f0f10;
    }

    .frame {
      width: 402px;
      height: 874px;
      background: #1c1c1e;
      border: none;
      border-radius: 0;
      overflow: hidden;
      position: relative;
    }

    .frame img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    /* Swipe down indicator */
    .swipe-indicator {
      position: absolute;
      width: 48px;
      height: 2.33px;
      right: 47.8px;
      top: 46.8px;
      background: #FFFFFF;
      opacity: 0.35;
      border-radius: 1.16666px;
      backdrop-filter: blur(14.9506px);
    }

    /* Status bar - iPhone */
    .status-bar {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 62px;
      display: flex;
      flex-direction: row;
      justify-content: space-between;
      align-items: center;
      padding: 21px 24px 19px;
      box-sizing: border-box;
      color: #fff;
      font-family: "SF Pro Display", Arial, sans-serif;
      font-size: 17px;
    }

    .time {
      width: 120px;
      text-align: center;
      font-weight: 590;
    }

    .levels {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100px;
      height: 22px;
    }

    .levels svg {
      width: 100%;
      height: 22px;
    }

    /* Home Indicator */
    .home-indicator {
      position: absolute;
      width: 144px;
      height: 5px;
      left: calc(50% - 144px/2);
      bottom: 8px;
      background: #FFFFFF;
      border-radius: 100px;
      transform: matrix(-1, 0, 0, 1, 0, 0);
    }

    /* Controls */
    .controls {
      position: absolute;
      width: 310px;
      height: 58px;
      left: 46px;
      top: 766px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .btn {
      width: 58px;
      height: 58px;
      border-radius: 100px;
      position: relative;
      display: flex;
      justify-content: center;
      align-items: center;
      color: #D9D9D9;
      font-size: 21px;
      font-weight: 700;
      font-family: "SF Pro Display", Arial;
      background: rgba(255,255,255,0.07);
      box-shadow: 0px 8px 40px rgba(0,0,0,0.2);
      backdrop-filter: blur(14px);
      opacity: 0.9;
    }

    .btn::after {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: 100px;
      box-shadow: inset 0 0 0 1px rgba(255,255,255,0.08);
      pointer-events: none;
    }
  </style>
</head>
